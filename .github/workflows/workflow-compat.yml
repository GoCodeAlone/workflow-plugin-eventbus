name: workflow-compat
# Compatibility gate against the latest wfctl release. Builds the plugin and
# runs `wfctl validate --plugin-dir <build-dir>` against a minimal config that
# exercises the v0.3.1 fix path: `trigger.eventbus.subscribe` supplying the
# BMW-style `consumer` / `bus` aliases without the proto-canonical `name` /
# `broker_ref`. Fails the PR if a future change breaks this compatibility.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow ad-hoc dispatch so we can re-run against a newer wfctl release
  # without needing a code change.
  workflow_dispatch:
    inputs:
      wfctl_version:
        description: 'wfctl version to validate against (e.g. v0.51.5, or "latest")'
        required: false
        default: latest

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # Build the plugin binary so `wfctl validate --plugin-dir` can find the
      # manifest. The plugin-dir layout expected by schema.LoadPluginTypesFromDir
      # is `<dir>/<subdir>/plugin.json` — the subdir name is not constrained,
      # but we use the plugin's canonical name for legibility.
      - name: Build plugin
        run: |
          set -eux
          mkdir -p build/workflow-plugin-eventbus
          go build -o build/workflow-plugin-eventbus/workflow-plugin-eventbus ./cmd/workflow-plugin-eventbus
          cp plugin.json plugin.contracts.json build/workflow-plugin-eventbus/

      - uses: GoCodeAlone/setup-wfctl@bcd880980f5bbe8d192d0c20ff6279d25331f956
        with:
          version: ${{ github.event.inputs.wfctl_version || 'latest' }}

      - name: wfctl version
        run: wfctl --version || wfctl version || true

      # Core compatibility assertion: a config that supplies `consumer` /
      # `bus` (BMW pattern) instead of `name` / `broker_ref` must validate.
      # Pre-v0.3.1 this surfaced as `config.name is required` at engine build
      # time; the static `wfctl validate --plugin-dir` path checks that the
      # plugin's module + trigger types load and the schema accepts the alias
      # keys at the YAML level. `--skip-unknown-types` is intentionally NOT
      # passed so an unloaded plugin (e.g. plugin-dir layout mismatch) fails
      # the gate loudly rather than masquerading as a pass. The deeper
      # handler-level assertion (CreateTrigger consumer→name aliasing) lives
      # in cmd/workflow-plugin-eventbus/plugin_test.go.
      - name: Validate trigger-no-name compat config
        run: |
          set -eux
          wfctl validate --plugin-dir ./build testdata/compat-trigger-no-name.yaml
